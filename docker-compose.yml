version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: expense_tracker_db
    restart: always
    environment:
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_password
      POSTGRES_DB: expense_tracker_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_tracker_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: expense_tracker_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:RELEASE.2024-01-16T16-06-34Z
    container_name: expense_tracker_createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/expense-bills;
      /usr/bin/mc anonymous set download myminio/expense-bills;
      exit 0;
      "

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense_tracker_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=expense_user
      - POSTGRES_PASSWORD=expense_password
      - POSTGRES_DB=expense_tracker_db
      - DATABASE_URL=postgresql://expense_user:expense_password@db:5432/expense_tracker_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_EXTERNAL_ENDPOINT=localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_NAME=expense-bills
      - MINIO_SECURE=false
      - SECRET_KEY=super-secret-jwt-key-change-this-in-production-use-openssl-rand-hex-32
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
